<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queue Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
  h1 { text-align: center; margin-bottom: 20px; color: #e94560; }
  .controls { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
  .control-group { display: flex; flex-direction: column; align-items: center; }
  .control-group label { font-size: 12px; color: #aaa; margin-bottom: 4px; }
  .control-group input { width: 120px; padding: 8px; border: 1px solid #444; border-radius: 6px; background: #16213e; color: #eee; text-align: center; font-size: 16px; }
  button { padding: 10px 32px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
  #runBtn { background: #e94560; color: #fff; }
  #runBtn:hover { background: #c73650; }
  #runBtn:disabled { background: #555; cursor: not-allowed; }
  #resetBtn { background: #0f3460; color: #fff; }
  #resetBtn:hover { background: #1a4a80; }
  #pauseBtn { background: #f5a623; color: #1a1a2e; display: none; }
  #pauseBtn:hover { background: #d4911e; }
  .stats { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
  .stat { background: #16213e; padding: 12px 20px; border-radius: 8px; text-align: center; min-width: 120px; }
  .stat .value { font-size: 28px; font-weight: bold; color: #e94560; }
  .stat .label { font-size: 11px; color: #888; margin-top: 2px; }
  .sim-area { display: flex; gap: 20px; margin-top: 10px; }
  .lane { flex: 1; background: #16213e; border-radius: 10px; padding: 16px; min-height: 300px; }
  .lane h3 { text-align: center; margin-bottom: 12px; font-size: 14px; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 8px; }
  .car { display: flex; align-items: center; gap: 8px; padding: 6px 10px; margin-bottom: 4px; border-radius: 6px; font-size: 13px; font-weight: 600; animation: slideIn 0.3s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateX(20px); } }
  .car.leaving { animation: fadeOut 0.3s ease-in forwards; }
  .car-icon { font-size: 18px; }
  .car.waiting { background: #533a0e; color: #f5c542; }
  .car.processing { background: #0f3460; color: #4fc3f7; }
  .car.done { background: #1b4332; color: #52b788; }
  .progress-bar-container { width: 100%; background: #0a0a1a; border-radius: 8px; height: 24px; margin-bottom: 16px; overflow: hidden; position: relative; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #e94560, #f5c542); border-radius: 8px; transition: width 0.3s; }
  .progress-text { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
  .time-display { text-align: center; font-size: 14px; color: #888; margin-bottom: 8px; }
  .time-display span { color: #e94560; font-weight: bold; font-size: 18px; }
</style>
</head>
<body>
<h1>🚗 Queue Simulator</h1>

<div class="controls">
  <div class="control-group">
    <label>Duration (HH:MM)</label>
    <input type="text" id="duration" value="05:30" placeholder="HH:MM" maxlength="5">
  </div>
  <div class="control-group">
    <label>Processing Speed (cars/hr)</label>
    <input type="number" id="speed" value="95" min="1">
  </div>
  <div class="control-group">
    <label>Number of Cars</label>
    <input type="number" id="numCars" value="665" min="1" max="200">
  </div>
  <div class="control-group">
    <label>Start Delay (min)</label>
    <input type="number" id="delay" value="15" min="0">
  </div>
  <div class="control-group" style="justify-content: flex-end; flex-direction: row; gap: 8px; align-self: flex-end;">
    <button id="runBtn" onclick="startSimulation()">▶ Run</button>
    <button id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
    <button id="resetBtn" onclick="window.location.reload()">↻ Reset</button>
  </div>
</div>

<div class="progress-bar-container">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
  <div class="progress-text" id="progressText">Ready</div>
</div>

<div class="time-display">Actual total time: <span id="simTime">0:00</span> / <span id="simTotal">0:00</span> (estimated to complete)</div>

<div class="stats">
  <div class="stat"><div class="value" id="statWaiting">0</div><div class="label">In Queue</div></div>
  <div class="stat"><div class="value" id="statProcessing">0</div><div class="label">Processing</div></div>
  <div class="stat"><div class="value" id="statDone">0</div><div class="label">Completed</div></div>
  <div class="stat"><div class="value" id="statMaxQueue">0</div><div class="label">Max Queue</div></div>
  <div class="stat"><div class="value" id="statAvgWait">0:00</div><div class="label">Avg Wait</div></div>
  <div class="stat"><div class="value" id="statMaxWait">0:00</div><div class="label">Longest Wait</div></div>
  <div class="stat"><div class="value" id="statIdleTime">0:00</div><div class="label">Idle Time (no queue)</div></div>
</div>

<div class="sim-area">
  <div class="lane" id="queueLane"><h3>🕐 Waiting in Queue</h3></div>
  <div class="lane" id="processLane"><h3>⚙️ Being Processed</h3></div>
  <div class="lane" id="doneLane"><h3>✅ Completed</h3></div>
</div>

<script>
let simInterval = null;
let cars = [];
let simRunning = false;
let simPaused = false;

const REAL_DURATION_MS = 30000; // 1 minute real time

function formatSimTime(simMinutes) {
  const h = Math.floor(simMinutes / 60);
  const m = Math.floor(simMinutes % 60);
  return h > 0 ? `${h}:${String(m).padStart(2,'0')}` : `${m}:${String(Math.floor((simMinutes%1)*60)).padStart(2,'0')}`;
}

function parseDuration(val) {
  const parts = val.split(':');
  if (parts.length === 2) {
    return parseInt(parts[0]) * 60 + parseInt(parts[1]);
  }
  return parseFloat(val);
}

function formatHourMin(simMinutes) {
  const h = Math.floor(simMinutes / 60);
  const m = Math.floor(simMinutes % 60);
  return `${h}:${String(m).padStart(2,'0')}`;
}

function formatMinSec(simMinutes) {
  const totalSec = Math.round(simMinutes * 60);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function startSimulation() {
  if (simRunning) return;
  simRunning = true;
  const durationMin = parseDuration(document.getElementById('duration').value);
  const speedPerHr = parseFloat(document.getElementById('speed').value);
  const numCars = parseInt(document.getElementById('numCars').value);
  if (numCars < 1 || durationMin < 1 || speedPerHr < 1) return;
  const delayMin = parseFloat(document.getElementById('delay').value) || 0;
  document.getElementById('runBtn').disabled = true;
  document.getElementById('pauseBtn').style.display = 'inline-block';
  cars = [];

  // Generate random arrival times uniformly distributed over the full duration
  const arrivalTimes = [0, 0, 0, 0, 0, ...Array.from({length: numCars - 5}, () => (Math.random() * durationMin))];
  arrivalTimes.sort((a, b) => a - b);
  for (let i = 0; i < numCars; i++) {
    cars.push({
      id: i + 1,
      arrivalTime: arrivalTimes[i],
      startProcessTime: null,
      doneTime: null,
      state: 'pending'
    });
  }

  // Processing time per car in sim-minutes (3x longer since 3 parallel lanes)
  const NUM_LANES = 3;
  const processTimePerCar = (60 / speedPerHr) * NUM_LANES;

  // Figure out total sim time needed
  // We simulate until all cars are done
  // Processing starts at delayMin
  // We need to figure out end time to know how to scale

  // Pre-calculate to find total sim duration with 3 parallel processors
  let laneAvailableAt = Array(NUM_LANES).fill(delayMin);
  let maxSimTime = 0;
  const preDone = [];
  for (let i = 0; i < numCars; i++) {
    const arrival = arrivalTimes[i];
    // Pick the lane that frees up earliest
    const earliestLane = laneAvailableAt.indexOf(Math.min(...laneAvailableAt));
    const canStart = Math.max(arrival, laneAvailableAt[earliestLane]);
    const done = canStart + processTimePerCar;
    preDone.push({ arrival, canStart, done });
    laneAvailableAt[earliestLane] = done;
    maxSimTime = Math.max(maxSimTime, done);
  }

  const totalSimMinutes = maxSimTime;
  document.getElementById('simTotal').textContent = formatHourMin(totalSimMinutes);

  // Time scale: totalSimMinutes maps to REAL_DURATION_MS
  const msPerSimMinute = REAL_DURATION_MS / totalSimMinutes;
  const TICK_MS = 50; // update every 50ms
  const simMinutesPerTick = TICK_MS / msPerSimMinute;

  let currentSimTime = 0;
  let processorFreeAt = Array(NUM_LANES).fill(delayMin); // track when each lane frees up
  let processingCars = Array(NUM_LANES).fill(null); // car in each lane
  let maxQueue = 0;
  let totalWaitTime = 0;
  let doneCount = 0;
  let maxWaitTime = 0;
  let idleSimTime = 0; // sim-minutes with no cars in queue

  function tick() {
    if (simPaused) return;
    currentSimTime += simMinutesPerTick;

    // Arrive cars
    for (const car of cars) {
      if (car.state === 'pending' && currentSimTime >= car.arrivalTime) {
        car.state = 'waiting';
      }
    }

    // Process as many cars as possible within this tick
    // (multiple cars may complete and start within one tick due to time scaling)
    let changed = true;
    while (changed) {
      changed = false;

      // Check each lane for completed cars
      for (let lane = 0; lane < NUM_LANES; lane++) {
        if (processingCars[lane] && currentSimTime >= processingCars[lane].doneTime) {
          processorFreeAt[lane] = processingCars[lane].doneTime;
          processingCars[lane].state = 'done';
          processingCars[lane].waitTime = processingCars[lane].startProcessTime - processingCars[lane].arrivalTime;
          doneCount++;
          totalWaitTime += processingCars[lane].waitTime;
          if (processingCars[lane].waitTime > maxWaitTime) maxWaitTime = processingCars[lane].waitTime;
          processingCars[lane] = null;
          changed = true;
        }
      }

      // Fill empty lanes with waiting cars
      for (let lane = 0; lane < NUM_LANES; lane++) {
        if (!processingCars[lane] && currentSimTime >= delayMin) {
          const next = cars.find(c => c.state === 'waiting');
          if (next) {
            next.state = 'processing';
            next.startProcessTime = Math.max(processorFreeAt[lane], next.arrivalTime);
            next.doneTime = next.startProcessTime + processTimePerCar;
            processingCars[lane] = next;
            if (currentSimTime >= next.doneTime) {
              changed = true;
            }
          }
        }
      }
    }

    // Stats
    const waiting = cars.filter(c => c.state === 'waiting').length;
    const processing = cars.filter(c => c.state === 'processing').length;
    const done = cars.filter(c => c.state === 'done').length;
    if (waiting > maxQueue) maxQueue = waiting;
    if (waiting === 0 && durationMin > currentSimTime) idleSimTime += simMinutesPerTick;

    document.getElementById('statWaiting').textContent = waiting;
    document.getElementById('statProcessing').textContent = processing;
    document.getElementById('statDone').textContent = done;
    document.getElementById('statMaxQueue').textContent = maxQueue;
    document.getElementById('statAvgWait').textContent = doneCount > 0 ? formatMinSec(totalWaitTime / doneCount) : '0:00';
    document.getElementById('statMaxWait').textContent = formatMinSec(maxWaitTime);
    document.getElementById('statIdleTime').textContent = formatMinSec(idleSimTime);

    // Progress
    const pct = Math.min(100, (currentSimTime / totalSimMinutes) * 100);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${Math.round(pct)}%`;
    document.getElementById('simTime').textContent = formatHourMin(Math.min(currentSimTime, totalSimMinutes));

    // Render lanes
    renderLanes();

    // Check if done
    if (done >= numCars) {
      clearInterval(simInterval);
      simInterval = null;
      simRunning = false;
      document.getElementById('runBtn').disabled = false;
      document.getElementById('pauseBtn').style.display = 'none';
      document.getElementById('progressText').textContent = '✅ Complete!';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('simTime').textContent = formatHourMin(totalSimMinutes);
      renderLanes();
    }
  }

  simInterval = setInterval(tick, TICK_MS);
}

function togglePause() {
  simPaused = !simPaused;
  document.getElementById('pauseBtn').textContent = simPaused ? '▶ Resume' : '⏸ Pause';
}

function renderLanes() {
  const queueLane = document.getElementById('queueLane');
  const processLane = document.getElementById('processLane');
  const doneLane = document.getElementById('doneLane');

  const waitingCars = cars.filter(c => c.state === 'waiting');
  const processingCars = cars.filter(c => c.state === 'processing');
  const doneCars = cars.filter(c => c.state === 'done');

  queueLane.innerHTML = '<h3>🕐 Waiting in Queue (' + waitingCars.length + ')</h3>' +
    waitingCars.map(c => `<div class="car waiting"><span class="car-icon">🚗</span> Car #${c.id}</div>`).join('');

  processLane.innerHTML = '<h3>⚙️ Being Processed (' + processingCars.length + ')</h3>' +
    processingCars.map(c => `<div class="car processing"><span class="car-icon">🔧</span> Car #${c.id}</div>`).join('');

  // Show last 30 done cars to avoid DOM overload
  // const recentDone = doneCar.slice(-50);
  doneLane.innerHTML = '<h3>✅ Completed (' + doneCars.length + ')</h3>' +
    doneCars.reverse().map(c => `<div class="car done"><span class="car-icon">✅</span> Car #${c.id} <span style="margin-left:auto;font-size:11px;opacity:0.8">waited ${formatMinSec(c.waitTime)}</span></div>`).join('');
}
</script>
</body>
</html>
